<!DOCTYPE html>
<html lang="en" style="--pointer-x: 0.0000; --pointer-y: 0.0000;"><head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>REAL RUST</title>
    <meta name="description" content="REAL RUST is a Rust-native campaign studio shaping premium endemic campaigns that feel authored from the first frame.">
    <meta name="theme-color" content="#090507">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400;6..96,500;6..96,600&amp;family=IBM+Plex+Mono:wght@400;500;600&amp;family=Sora:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="site-shell">
      <header class="top-rail" aria-label="Site frame">
        <nav class="top-links" aria-label="Primary">
          <span>Campaigns</span>
          <span>Method</span>
          <a href="mailto:hello@realrust.studio?subject=Start%20a%20conversation">Contact</a>
        </nav>

        <a class="wordmark" href="./" aria-label="REAL RUST home">REAL RUST</a>

        <p class="utility-label">Rust-native campaign studio</p>
      </header>

      <main class="hero-stage" data-hero-stage="" aria-labelledby="hero-title">
        <div class="headline-wrap">
          <h1 class="hero-title" id="hero-title">
            <span>We make brands</span>
            <span>belong in Rust.</span>
          </h1>
        </div>

        <div class="scene-stage" aria-hidden="true">
          <div class="scene-composition">
            <span class="scene-floor"></span>
            <span class="scene-glow scene-glow--north"></span>
            <span class="scene-glow scene-glow--south"></span>
            <span class="scene-fog scene-fog--left"></span>
            <span class="scene-fog scene-fog--right"></span>
            <span class="scene-trace scene-trace--warm"></span>
            <span class="scene-trace scene-trace--cool"></span>
            <span class="scene-optic scene-optic--entry">
              <span class="scene-optic__core"></span>
              <span class="scene-optic__distortion"></span>
              <span class="scene-optic__edge"></span>
              <span class="scene-optic__flare"></span>
            </span>
            <span class="scene-optic scene-optic--membrane">
              <span class="scene-optic__core"></span>
              <span class="scene-optic__distortion"></span>
              <span class="scene-optic__edge"></span>
              <span class="scene-optic__flare"></span>
              <span class="scene-optic__glint"></span>
            </span>
            <span class="scene-optic scene-optic--exit">
              <span class="scene-optic__core"></span>
              <span class="scene-optic__distortion"></span>
              <span class="scene-optic__edge"></span>
              <span class="scene-optic__flare"></span>
            </span>
            <span class="scene-ring scene-ring--wide"></span>
            <span class="scene-ring scene-ring--gate"></span>
            <span class="scene-wipe"></span>
            <span class="cast-object cast-object--sphere" data-cast="sphere" style="opacity: 0.763; --influence: 0.000; transform: translate3d(24.49px, 206.19px, 0px) rotate(-10.95deg) scale(1.041);">
              <span class="cast-object__glow"></span>
              <span class="cast-object__glint"></span>
            </span>
            <span class="cast-object cast-object--capsule" data-cast="capsule" hidden="">
              <span class="cast-object__glow"></span>
              <span class="cast-object__glint"></span>
            </span>
            <span class="cast-object cast-object--monolith" data-cast="monolith" style="opacity: 0.968; --influence: 0.025; transform: translate3d(267.78px, 273.91px, 0px) rotate(3.79deg) scale(0.976);">
              <span class="cast-object__glow"></span>
              <span class="cast-object__glint"></span>
            </span>
            <span class="cast-object cast-object--cuboid" data-cast="cuboid" hidden="">
              <span class="cast-object__glow"></span>
              <span class="cast-object__glint"></span>
            </span>
          </div>
        </div>
      </main>

      <footer class="interaction-rail">
        <div class="rail-copy">
          <p class="support-line">
            Premium Rust-native campaigns for endemic brands — designed to land inside the wipe, not on top of it.
          </p>
        </div>

        <span class="rail-divider" aria-hidden="true"></span>

        <div class="rail-action">
          <a class="cta" href="mailto:hello@realrust.studio?subject=Start%20a%20conversation">
            Start a conversation
          </a>
        </div>
      </footer>
    </div>

    <script type="module" src="./app.js"></script>
  

</body></html>
