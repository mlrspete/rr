<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>REAL RUST</title>
    <meta
      name="description"
      content="REAL RUST is a Rust-native campaign studio shaping premium endemic campaigns that feel authored from the first frame."
    >
    <meta name="theme-color" content="#090507">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:opsz,wght@6..96,400;6..96,500;6..96,600&family=IBM+Plex+Mono:wght@400;500;600&family=Sora:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    >
  </head>
  <body>
    <div class="site-shell">
      <div class="hero-canvas" data-hero-canvas aria-hidden="true"></div>

      <div class="site-overlay">
        <div class="callout-stage" data-callout-layer aria-hidden="true"></div>

        <header class="top-rail" aria-label="Site frame">
          <div class="top-links" aria-hidden="true"></div>

          <a class="wordmark" data-intro="wordmark" href="./" aria-label="REAL RUST home">
            REAL RUST
          </a>

          <p class="utility-label" data-intro="utility">Rust-native campaign studio</p>
        </header>

        <main class="hero-stage" data-hero-stage aria-labelledby="hero-title">
          <div class="hero-copy">
            <div class="headline-wrap">
              <h1 class="hero-title" id="hero-title">
                <span data-intro="headline">We make brands</span>
                <span data-intro="headline">belong in Rust.</span>
              </h1>
            </div>
          </div>

          <div class="hero-visual-field" aria-hidden="true"></div>
        </main>

        <footer class="interaction-rail" data-intro="rail">
          <div class="rail-copy" data-intro="support">
            <p class="support-line">
              Premium Rust-native campaigns for endemic brands &mdash; designed to land inside the wipe, not on top of it.
            </p>
          </div>

          <span class="rail-divider" aria-hidden="true"></span>

          <div class="rail-action" data-intro="action">
            <div class="contact-shell" data-contact-shell data-open="false" data-status="idle">
              <div
                class="contact-panel"
                id="contact-panel"
                data-contact-panel
                role="group"
                aria-label="Contact email"
                aria-hidden="true"
              >
                <p class="contact-email" data-contact-email>
                  hello@realrust.studio
                </p>

                <div class="contact-options">
                  <button class="contact-option" type="button" data-copy-email>
                    Copy email
                  </button>
                </div>
              </div>

              <p
                class="contact-feedback"
                data-contact-feedback
                aria-live="polite"
                aria-atomic="true"
                role="status"
              ></p>

              <button
                class="cta"
                type="button"
                data-contact-toggle
                aria-expanded="false"
                aria-controls="contact-panel"
              >
                <span class="cta__label">Start a conversation</span>
                <span class="cta__icon" aria-hidden="true"></span>
              </button>
            </div>
          </div>
        </footer>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
